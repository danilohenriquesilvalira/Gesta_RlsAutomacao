version: '3.9'

services:
  # ── DNS Server ───────────────────────────────────────────────
  dns:
    image: coredns/coredns:latest
    container_name: gestao_dns
    restart: unless-stopped
    ports:
      - "0.0.0.0:53:53/udp"
      - "0.0.0.0:53:53/tcp"
    volumes:
      - ./dns/Corefile:/Corefile:ro
    command: -conf /Corefile

  # ── PostgreSQL Database ──────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: gestao_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: rls
      POSTGRES_PASSWORD: Rls@2024
      POSTGRES_DB: gestao_rls
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "0.0.0.0:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rls -d gestao_rls"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Rust Backend API ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gestao_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://rls:Rls@2024@postgres:5432/gestao_rls
      JWT_SECRET: Rls@2024_jwt_secret_key_gestao_rls
      BACKEND_URL: ""
      UPLOAD_DIR: /app/uploads
      RUST_LOG: info
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "0.0.0.0:8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── React Frontend ───────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    container_name: gestao_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "0.0.0.0:80:80"

volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local
